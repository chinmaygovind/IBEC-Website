AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: IBEC Portfolio API (Flask on Lambda)

Globals:
  Function:
    Timeout: 120
    MemorySize: 512

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      Runtime: python3.11
      CodeUri: .
      Architectures:
        - x86_64
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - '*'
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - Content-Type
      Events:
        KeepWarm:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Prevents cold starts by pinging the function

Outputs:
  ApiUrl:
    Description: Lambda Function URL for the API
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
